name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Never cancel a running deploy — a cancelled assemble leaves Pages serving
  # the previous build with no indication the release failed.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Verify tag matches package.json version
        # TAG via env, never inlined: a git ref name can carry shell
        # metacharacters, so ${{ github.ref_name }} in a script body is an
        # injection sink.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          EXPECTED="v$(node -p "require('./package.json').version" | cut -d. -f1,2)"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "ERROR: tag '$TAG' does not match '$EXPECTED' derived from package.json.version" >&2
            exit 1
          fi
      - run: npm run lint
      - run: npm run test:run
      - run: npx vite build --base=/cute/
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
