<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!-- PWA manifest link is auto-injected by vite-plugin-pwa at build — don't add it here. -->
    <!-- iOS install icon — must use %BASE_URL% so versioned Pages builds resolve it. -->
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" sizes="180x180" />
    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Cute Baby Meditation">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Chrome/Android browser tab + PWA theme color -->
    <meta name="theme-color" content="#414957">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Pre-paint data-theme so returning users never see a wrong-theme flash.
         Reads the persisted pref (key must track STATE_KEY in src/storage); any
         non-'light'/'dark' value (incl. 'system' and absent/corrupt state)
         follows the OS preference, matching coerceTheme's default. -->
    <script>(function(){try{var t='system',raw=localStorage.getItem('cute:state:v1');if(raw){var p=JSON.parse(raw);if(p&&p.prefs&&typeof p.prefs.theme==='string')t=p.prefs.theme}var sysDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;var dark=t==='dark'||(t!=='light'&&sysDark);document.documentElement.setAttribute('data-theme',dark?'dark':'light')}catch(_){document.documentElement.setAttribute('data-theme','light')}})();</script>
    <title>Cute Baby Meditation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
